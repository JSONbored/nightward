version: 0.1
required_trunk_version: ">=1.25.0"
runtimes:
  enabled:
    - system
tools:
  definitions:
    - name: nightward
      runtime: system
      package: nw
      shims: [nw]
      known_good_version: 0.1.5
lint:
  definitions:
    - name: nightward-policy
      files: [ALL]
      tools: [nightward]
      main_tool: nightward
      direct_configs:
        - .nightward.yml
        - .mcp.json
        - mcp.json
        - AGENTS.md
      suggest_if: config_present
      known_good_version: 0.1.5
      commands:
        - name: lint
          output: sarif
          run: nw policy sarif --workspace ${workspace} --output -
          success_codes: [0]
          read_output_from: stdout
          batch: true
          cache_results: false
          is_security: true
    - name: nightward-analyze
      files: [ALL]
      tools: [nightward]
      main_tool: nightward
      direct_configs:
        - .nightward.yml
        - .mcp.json
        - mcp.json
        - AGENTS.md
      suggest_if: config_present
      known_good_version: 0.1.5
      commands:
        - name: lint
          output: sarif
          run: nw policy sarif --workspace ${workspace} --include-analysis --output -
          success_codes: [0]
          read_output_from: stdout
          batch: true
          cache_results: false
          is_security: true
