name: Nightward
author: JSONbored
description: Run Nightward scan, policy, SARIF, or badge checks in GitHub Actions.

inputs:
  mode:
    description: "Run mode: scan, policy, sarif, or badge."
    required: false
    default: policy
  config:
    description: Optional .nightward.yml path.
    required: false
    default: ""
  strict:
    description: Fail policy checks on medium or higher findings.
    required: false
    default: "true"
  output:
    description: Output path for scan JSON or SARIF.
    required: false
    default: nightward.sarif
  home:
    description: HOME path Nightward should scan.
    required: false
    default: ""
  workspace:
    description: Repository/workspace path Nightward should scan instead of HOME.
    required: false
    default: ""
  include-analysis:
    description: Include offline analysis signals in policy or SARIF modes.
    required: false
    default: "false"
  sarif-url:
    description: Optional SARIF URL to include in badge mode.
    required: false
    default: ""

outputs:
  findings-count:
    description: Number of findings in the generated report.
    value: ${{ steps.summary.outputs.findings-count }}
  policy-passed:
    description: Whether policy mode passed.
    value: ${{ steps.summary.outputs.policy-passed }}
  output:
    description: Output path written by scan or sarif mode.
    value: ${{ steps.run-nightward.outputs.output }}

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: ${{ github.action_path }}/go.mod
        cache: true

    - name: Run Nightward
      id: run-nightward
      shell: bash
      env:
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_STRICT: ${{ inputs.strict }}
        INPUT_OUTPUT: ${{ inputs.output }}
        INPUT_HOME: ${{ inputs.home }}
        INPUT_WORKSPACE: ${{ inputs.workspace }}
        INPUT_INCLUDE_ANALYSIS: ${{ inputs.include-analysis }}
        INPUT_SARIF_URL: ${{ inputs.sarif-url }}
      run: |
        set -euo pipefail

        mode="${INPUT_MODE}"
        config="${INPUT_CONFIG}"
        strict="${INPUT_STRICT}"
        output="${INPUT_OUTPUT}"
        scan_home="${INPUT_HOME}"
        scan_workspace="${INPUT_WORKSPACE:-}"
        include_analysis="${INPUT_INCLUDE_ANALYSIS}"
        sarif_url="${INPUT_SARIF_URL}"

        if [[ -n "${scan_home}" ]]; then
          export NIGHTWARD_HOME="${scan_home}"
        fi

        config_args=()
        if [[ -n "${config}" ]]; then
          bash "${GITHUB_ACTION_PATH}/scripts/validate-action-path.sh" config "${config}"
          config_args+=(--config "${GITHUB_WORKSPACE}/${config}")
        fi
        bash "${GITHUB_ACTION_PATH}/scripts/validate-action-path.sh" output "${output}"
        output_path="${GITHUB_WORKSPACE}/${output}"
        summary_path="${output_path}"
        if [[ "${output}" == "-" ]]; then
          summary_path="${GITHUB_WORKSPACE}/nightward-output.json"
        else
          mkdir -p "$(dirname "${output_path}")"
        fi
        workspace_args=()
        if [[ -n "${scan_workspace}" ]]; then
          workspace_args+=(--workspace "${scan_workspace}")
        fi
        analysis_args=()
        if [[ "${include_analysis}" == "true" ]]; then
          analysis_args+=(--include-analysis)
        fi

        cd "${GITHUB_ACTION_PATH}"
        case "${mode}" in
          scan)
            if [[ "${output}" == "-" ]]; then
              go run ./cmd/nw scan "${workspace_args[@]}" --json --output - >"${summary_path}"
              echo "output=nightward-output.json" >>"${GITHUB_OUTPUT}"
            else
              go run ./cmd/nw scan "${workspace_args[@]}" --json --output "${output_path}"
              echo "output=${output}" >>"${GITHUB_OUTPUT}"
            fi
            echo "output-path=${summary_path}" >>"${GITHUB_OUTPUT}"
            ;;
          policy)
            args=(policy check "${config_args[@]}" "${workspace_args[@]}" "${analysis_args[@]}" --json)
            if [[ "${strict}" == "true" ]]; then
              args+=(--strict)
            fi
            set +e
            go run ./cmd/nw "${args[@]}" >"${GITHUB_WORKSPACE}/nightward-policy.json"
            policy_exit=$?
            set -e
            echo "policy-exit-code=${policy_exit}" >>"${GITHUB_OUTPUT}"
            echo "output=nightward-policy.json" >>"${GITHUB_OUTPUT}"
            echo "output-path=${GITHUB_WORKSPACE}/nightward-policy.json" >>"${GITHUB_OUTPUT}"
            ;;
          sarif)
            if [[ "${output}" == "-" ]]; then
              go run ./cmd/nw policy sarif "${config_args[@]}" "${workspace_args[@]}" "${analysis_args[@]}" --output - >"${summary_path}"
              echo "output=nightward-output.json" >>"${GITHUB_OUTPUT}"
            else
              go run ./cmd/nw policy sarif "${config_args[@]}" "${workspace_args[@]}" "${analysis_args[@]}" --output "${output_path}"
              echo "output=${output}" >>"${GITHUB_OUTPUT}"
            fi
            echo "output-path=${summary_path}" >>"${GITHUB_OUTPUT}"
            ;;
          badge)
            if [[ "${output}" == "-" ]]; then
              go run ./cmd/nw policy badge "${config_args[@]}" "${workspace_args[@]}" "${analysis_args[@]}" --sarif-url "${sarif_url}" --output - >"${summary_path}"
              echo "output=nightward-output.json" >>"${GITHUB_OUTPUT}"
            else
              go run ./cmd/nw policy badge "${config_args[@]}" "${workspace_args[@]}" "${analysis_args[@]}" --sarif-url "${sarif_url}" --output "${output_path}"
              echo "output=${output}" >>"${GITHUB_OUTPUT}"
            fi
            echo "output-path=${summary_path}" >>"${GITHUB_OUTPUT}"
            ;;
          *)
            echo "unsupported mode: ${mode}" >&2
            exit 2
            ;;
        esac

    - name: Summarize Nightward output
      id: summary
      shell: bash
      env:
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_OUTPUT: ${{ inputs.output }}
      run: |
        set -euo pipefail

        case "${INPUT_MODE}" in
          scan)
            python3 -c 'import json, sys; data=json.load(open(sys.argv[1], encoding="utf-8")); print("findings-count=%s" % data.get("summary", {}).get("total_findings", 0)); print("policy-passed=")' "${{ steps.run-nightward.outputs.output-path }}" >>"${GITHUB_OUTPUT}"
            ;;
          policy)
            python3 -c 'import json, sys; data=json.load(open(sys.argv[1], encoding="utf-8")); print("findings-count=%s" % data.get("summary", {}).get("total_findings", 0)); print("policy-passed=%s" % str(data.get("passed", False)).lower())' "${{ steps.run-nightward.outputs.output-path }}" >>"${GITHUB_OUTPUT}"
            ;;
          sarif)
            python3 -c 'import json, sys; data=json.load(open(sys.argv[1], encoding="utf-8")); count=sum(len(run.get("results", [])) for run in data.get("runs", [])); print(f"findings-count={count}"); print("policy-passed=")' "${{ steps.run-nightward.outputs.output-path }}" >>"${GITHUB_OUTPUT}"
            ;;
          badge)
            python3 -c 'import json, sys; data=json.load(open(sys.argv[1], encoding="utf-8")); print("findings-count=%s" % data.get("total_findings", 0)); print("policy-passed=%s" % str(data.get("passed", False)).lower())' "${{ steps.run-nightward.outputs.output-path }}" >>"${GITHUB_OUTPUT}"
            ;;
        esac

    - name: Fail on Nightward policy violation
      if: ${{ inputs.mode == 'policy' && steps.run-nightward.outputs.policy-exit-code != '0' }}
      shell: bash
      run: exit 1
