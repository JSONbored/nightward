name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests with JUnit
        id: go-tests
        continue-on-error: true
        run: make clean-reports go-test-junit

      - name: Upload test report artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-test-junit
          path: reports/go-tests.xml
          if-no-files-found: error

      - name: Validate JUnit report shape
        if: ${{ always() }}
        run: |
          python3 -c 'import pathlib, sys, xml.etree.ElementTree as ET; report=pathlib.Path("reports/go-tests.xml"); (report.exists() or (print("missing reports/go-tests.xml", file=sys.stderr), sys.exit(1))); root=ET.parse(report).getroot(); (root.tag in {"testsuite", "testsuites"} or (print(f"unexpected JUnit root: {root.tag}", file=sys.stderr), sys.exit(1))); cases=root.findall(".//testcase"); (cases or (print("JUnit report contains no test cases", file=sys.stderr), sys.exit(1))); print(f"validated {len(cases)} JUnit test cases")'

      - name: Check Trunk Flaky Tests upload credentials
        id: trunk-flaky
        if: ${{ always() }}
        env:
          TRUNK_ORG_URL_SLUG: ${{ secrets.TRUNK_ORG_URL_SLUG }}
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -n "${TRUNK_ORG_URL_SLUG}" && -n "${TRUNK_API_TOKEN}" ]]; then
            echo "enabled=true" >>"${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >>"${GITHUB_OUTPUT}"
          fi

      - name: Upload Trunk Flaky Tests report
        if: ${{ always() && steps.trunk-flaky.outputs.enabled == 'true' }}
        uses: trunk-io/analytics-uploader@95a0fb8b29e45b6068304261fb518644b426a803 # v2.0.8
        env:
          TRUNK_ORG_URL_SLUG: ${{ secrets.TRUNK_ORG_URL_SLUG }}
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
        with:
          junit-paths: reports/go-tests.xml
          org-slug: ${{ env.TRUNK_ORG_URL_SLUG }}
          token: ${{ env.TRUNK_API_TOKEN }}
          variant: go
          use-cache: true
          previous-step-outcome: ${{ steps.go-tests.outcome }}

      - name: Fail on test failure
        if: ${{ steps.go-tests.outcome != 'success' }}
        run: exit 1

      - name: Race tests
        run: make test-race

      - name: Go vet
        run: make vet

      - name: Staticcheck
        run: make staticcheck

      - name: Gosec static analysis
        run: make gosec

      - name: Fuzz smoke
        run: make fuzz-smoke

      - name: Coverage gate
        run: make coverage-check

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-coverage
          path: |
            reports/coverage.out
            reports/coverage.txt
          if-no-files-found: error

  trunk:
    name: Trunk Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Trunk
        run: sudo TRUNK_VERSION=1.25.0 bash scripts/install-trunk-ci.sh

      - name: Run Trunk Check
        run: trunk check --show-existing --all --no-fix

  raycast:
    name: Raycast extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: integrations/raycast/package-lock.json

      - name: Install Raycast extension dependencies
        run: npm ci --ignore-scripts --no-audit
        working-directory: integrations/raycast

      - name: Run Raycast extension tests with JUnit
        id: raycast-tests
        continue-on-error: true
        run: npm run test:junit
        working-directory: integrations/raycast

      - name: Upload Raycast test report artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: raycast-test-junit
          path: reports/junit/raycast.xml
          if-no-files-found: error

      - name: Validate Raycast JUnit report shape
        if: ${{ always() }}
        run: |
          python3 -c 'import pathlib, sys, xml.etree.ElementTree as ET; report=pathlib.Path("reports/junit/raycast.xml"); (report.exists() or (print("missing reports/junit/raycast.xml", file=sys.stderr), sys.exit(1))); root=ET.parse(report).getroot(); (root.tag in {"testsuite", "testsuites"} or (print(f"unexpected JUnit root: {root.tag}", file=sys.stderr), sys.exit(1))); cases=root.findall(".//testcase"); (cases or (print("JUnit report contains no test cases", file=sys.stderr), sys.exit(1))); print(f"validated {len(cases)} JUnit test cases")'

      - name: Check Raycast Trunk Flaky Tests upload credentials
        id: trunk-flaky
        if: ${{ always() }}
        env:
          TRUNK_ORG_URL_SLUG: ${{ secrets.TRUNK_ORG_URL_SLUG }}
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -n "${TRUNK_ORG_URL_SLUG}" && -n "${TRUNK_API_TOKEN}" ]]; then
            echo "enabled=true" >>"${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >>"${GITHUB_OUTPUT}"
          fi

      - name: Upload Raycast Trunk Flaky Tests report
        if: ${{ always() && steps.trunk-flaky.outputs.enabled == 'true' }}
        uses: trunk-io/analytics-uploader@95a0fb8b29e45b6068304261fb518644b426a803 # v2.0.8
        env:
          TRUNK_ORG_URL_SLUG: ${{ secrets.TRUNK_ORG_URL_SLUG }}
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
        with:
          junit-paths: reports/junit/raycast.xml
          org-slug: ${{ env.TRUNK_ORG_URL_SLUG }}
          token: ${{ env.TRUNK_API_TOKEN }}
          variant: raycast
          use-cache: true
          previous-step-outcome: ${{ steps.raycast-tests.outcome }}

      - name: Fail on Raycast test failure
        if: ${{ steps.raycast-tests.outcome != 'success' }}
        run: exit 1

      - name: Audit Raycast dependencies
        run: npm audit --audit-level=moderate
        working-directory: integrations/raycast

      - name: Lint Raycast extension
        run: npm run lint
        working-directory: integrations/raycast

      - name: Build Raycast extension
        run: npm run build
        working-directory: integrations/raycast

  npm-package:
    name: NPM package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: packages/npm/package-lock.json

      - name: Install npm package dependencies
        run: npm ci --ignore-scripts --no-audit
        working-directory: packages/npm

      - name: Test npm launcher
        run: npm test
        working-directory: packages/npm

      - name: Audit npm launcher dependencies
        run: npm audit --audit-level=moderate
        working-directory: packages/npm

      - name: Dry-run npm package
        run: npm run pack:dry-run
        working-directory: packages/npm

  site:
    name: Documentation site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        run: npm ci --ignore-scripts --no-audit
        working-directory: site

      - name: Audit site dependencies
        run: npm audit --audit-level=moderate
        working-directory: site

      - name: Build documentation site
        run: npm run build
        working-directory: site

  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Gitleaks
        run: make gitleaks

  govulncheck:
    name: Go vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run govulncheck
        run: make govulncheck

  osv:
    name: OSV dependency scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run OSV Scanner
        uses: google/osv-scanner-action/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5 # v2.3.5
        with:
          scan-args: |-
            --recursive
            ./

  dco:
    name: DCO sign-off
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check DCO sign-offs
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: bash scripts/check-dco.sh "${BASE_SHA}" "${HEAD_SHA}"

  release-snapshot:
    name: Release snapshot
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser snapshot
        run: make release-snapshot
