name: Nightward Policy

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  actions: read
  contents: read

concurrency:
  group: nightward-policy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sarif:
    name: Generate Nightward SARIF
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Rust
        run: |
          rustup toolchain install 1.85.0 --profile minimal
          rustup default 1.85.0

      - name: Build policy SARIF
        run: cargo run --quiet --bin nw -- policy sarif --workspace "${GITHUB_WORKSPACE}" --output nightward.sarif

      - name: Build policy badge artifact
        env:
          SARIF_URL: ${{ github.server_url }}/${{ github.repository }}/security/code-scanning?query=tool%3ANightward
        run: cargo run --quiet --bin nw -- policy badge --workspace "${GITHUB_WORKSPACE}" --output nightward-badge.json --sarif-url "${SARIF_URL}"

      - name: Upload policy badge artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightward-policy-badge
          path: nightward-badge.json
          if-no-files-found: error

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: nightward.sarif
          category: nightward-policy
