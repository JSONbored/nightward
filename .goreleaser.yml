version: 2

project_name: nightward

before:
  hooks:
    - go mod tidy
    - cd packages/tui && bun install --frozen-lockfile
    - cd packages/tui && bun run sidecars

builds:
  - id: nightward
    main: ./cmd/nightward
    binary: nightward
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/jsonbored/nightward/internal/cli.version={{ .Version }}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
  - id: nw
    main: ./cmd/nw
    binary: nw
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/jsonbored/nightward/internal/cli.version={{ .Version }}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    ids:
      - nightward
      - nw
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE
      - SECURITY.md
      - src: build/opentui/{{ .Os }}_{{ .Arch }}/nightward-tui*
        strip_parent: true

checksum:
  name_template: checksums.txt

sboms:
  - artifacts: archive

signs:
  - cmd: cosign
    artifacts: checksum
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - --bundle=${signature}
      - ${artifact}
      - --yes

changelog:
  use: github-native
